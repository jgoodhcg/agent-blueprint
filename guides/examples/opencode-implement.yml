name: OpenCode Roadmap

on:
  workflow_dispatch:
    inputs:
      roadmap_path:
        description: Path to the roadmap work unit under roadmap/
        required: true
        type: string
      mode:
        description: Execution mode
        required: true
        default: implement
        type: choice
        options:
          - implement
          - review
      review_model:
        description: Zen review model to use when mode=review
        required: false
        default: opencode/random-frontier
        type: choice
        options:
          - opencode/random-frontier
          - opencode/gpt-5.4
          - opencode/gemini-3.1-pro-preview
      pr_number:
        description: Pull request number to review when mode=review
        required: false
        type: string

jobs:
  roadmap:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate roadmap input
        id: roadmap
        shell: bash
        run: |
          set -euo pipefail

          roadmap_path="${{ inputs.roadmap_path }}"

          case "${roadmap_path}" in
            roadmap/[0-9][0-9][0-9]-*.md) ;;
            *)
              echo "roadmap_path must point to a numbered roadmap work unit under roadmap/ (for example roadmap/001-example.md)" >&2
              exit 1
              ;;
          esac

          if [[ ! -f "${roadmap_path}" ]]; then
            echo "roadmap file not found: ${roadmap_path}" >&2
            exit 1
          fi

          status="$(sed -n '1,20p' "${roadmap_path}" | sed -n 's/^status: //p' | head -n 1)"

          case "${status}" in
            ready|active) ;;
            *)
              echo "roadmap file must be in ready or active status, found: ${status:-missing}" >&2
              exit 1
              ;;
          esac

          printf 'roadmap_path=%s\n' "${roadmap_path}" >> "${GITHUB_OUTPUT}"
          printf 'roadmap_status=%s\n' "${status}" >> "${GITHUB_OUTPUT}"

      - name: Resolve review model
        id: review
        shell: bash
        run: |
          set -euo pipefail

          mode="${{ inputs.mode }}"
          review_model="${{ inputs.review_model }}"
          pr_number="${{ inputs.pr_number }}"

          case "${mode}" in
            implement)
              printf 'model=zai-plan/glm-5\n' >> "${GITHUB_OUTPUT}"
              printf 'requested_model=\n' >> "${GITHUB_OUTPUT}"
              printf 'target_ref=\n' >> "${GITHUB_OUTPUT}"
              ;;
            review)
              case "${review_model}" in
                opencode/random-frontier|opencode/gpt-5.4|opencode/gemini-3.1-pro-preview) ;;
                *)
                  echo "unsupported review model: ${review_model}" >&2
                  exit 1
                  ;;
              esac
              if [[ -z "${pr_number}" ]]; then
                echo "pr_number is required when mode=review" >&2
                exit 1
              fi
              resolved_model="${review_model}"
              if [[ "${review_model}" == "opencode/random-frontier" ]]; then
                if (( RANDOM % 2 )); then
                  resolved_model="opencode/gpt-5.4"
                else
                  resolved_model="opencode/gemini-3.1-pro-preview"
                fi
              fi
              printf 'requested_model=%s\n' "${review_model}" >> "${GITHUB_OUTPUT}"
              printf 'model=%s\n' "${resolved_model}" >> "${GITHUB_OUTPUT}"
              printf 'target_ref=PR #%s\n' "${pr_number}" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "unsupported mode: ${mode}" >&2
              exit 1
              ;;
          esac

      - name: Resolve git identity
        id: git_identity
        shell: bash
        run: |
          set -euo pipefail

          printf 'author_name=%s\n' 'github-actions[bot]' >> "${GITHUB_OUTPUT}"
          printf 'author_email=%s\n' '41898282+github-actions[bot]@users.noreply.github.com' >> "${GITHUB_OUTPUT}"

      - name: Run OpenCode roadmap action
        id: opencode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZAI_CODING_PLAN_API_KEY: ${{ secrets.ZAI_CODING_PLAN_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GIT_AUTHOR_NAME: ${{ steps.git_identity.outputs.author_name }}
          GIT_AUTHOR_EMAIL: ${{ steps.git_identity.outputs.author_email }}
          GIT_COMMITTER_NAME: ${{ steps.git_identity.outputs.author_name }}
          GIT_COMMITTER_EMAIL: ${{ steps.git_identity.outputs.author_email }}
        with:
          model: ${{ steps.review.outputs.model }}
          use_github_token: true
          prompt: |
            `${{ inputs.mode }}` mode for roadmap work unit `${{ steps.roadmap.outputs.roadmap_path }}`.

            Shared execution contract:
            - Treat that roadmap file as the canonical source of scope.
            - Read `AGENTS.md` and the roadmap file before making changes.
            - Apply the `Runtime: Autonomous GitHub Actions` policy in `AGENTS.md`.
            - Run the repository validation commands listed in `AGENTS.md` before finishing.
            - Reference the roadmap path `${{ steps.roadmap.outputs.roadmap_path }}` in the final PR summary or review summary.
            - Do not use GitHub issue text as the canonical task definition.
            - Do not execute work outside the requested roadmap unit unless required for correctness.
            - Do not ask follow-up questions unless blocked on a true ambiguity in the roadmap file.
            - If you create commits, keep the git author/committer identity provided by the workflow environment and use normal `Co-authored-by` plus AI trailer attribution for the model.

            If mode is `implement`:
            - Use `zai-plan/glm-5`.
            - Implement the roadmap work unit directly.
            - If implementation changes are required, create a branch and open a pull request.

            If mode is `review`:
            - Use `${{ steps.review.outputs.model }}` through OpenCode Zen.
            - Review `${{ steps.review.outputs.target_ref }}` against the roadmap work unit.
            - Produce review feedback only; do not implement fixes in this run.
            - Do not open additional pull requests.

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          target_ref="${{ steps.review.outputs.target_ref }}"
          requested_model="${{ steps.review.outputs.requested_model }}"
          if [[ -z "${target_ref}" ]]; then
            target_ref="n/a"
          fi
          if [[ -z "${requested_model}" ]]; then
            requested_model="n/a"
          fi

          {
            echo "## OpenCode Roadmap"
            echo
            echo "- Mode: \`${{ inputs.mode }}\`"
            echo "- Roadmap path: \`${{ steps.roadmap.outputs.roadmap_path }}\`"
            echo "- Roadmap status: \`${{ steps.roadmap.outputs.roadmap_status }}\`"
            echo "- Requested review model: \`${requested_model}\`"
            echo "- Resolved model: \`${{ steps.review.outputs.model }}\`"
            echo "- Git commit identity: \`${{ steps.git_identity.outputs.author_name }} <${{ steps.git_identity.outputs.author_email }}>\`"
            echo "- Review target: \`${target_ref}\`"
            echo "- OpenCode action outcome: \`${{ steps.opencode.outcome }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
