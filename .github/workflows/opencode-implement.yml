name: OpenCode Roadmap
run-name: OpenCode ${{ inputs.mode }} / ${{ inputs.roadmap_path }}

on:
  workflow_dispatch:
    inputs:
      roadmap_path:
        description: Path to the roadmap work unit under roadmap/
        required: true
        type: string
      mode:
        description: Execution mode
        required: true
        default: implement
        type: choice
        options:
          - implement
          - review
      model:
        description: Optional provider/model override for implement or review
        required: false
        type: string
      pr_number:
        description: Pull request number to review when mode=review
        required: false
        type: string

jobs:
  roadmap:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      OPENCODE_CONFIG: ${{ github.workspace }}/opencode.json
      OPENCODE_DISABLE_AUTOUPDATE: "1"
      OPENCODE_DISABLE_PRUNE: "1"
      OPENCODE_DISABLE_TERMINAL_TITLE: "1"
      OPENCODE_PERMISSION: '{"*":"allow"}'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate roadmap input
        id: roadmap
        shell: bash
        run: |
          set -euo pipefail

          roadmap_path="${{ inputs.roadmap_path }}"

          case "${roadmap_path}" in
            roadmap/[0-9][0-9][0-9]-*.md) ;;
            *)
              echo "roadmap_path must point to a numbered roadmap work unit under roadmap/ (for example roadmap/001-example.md)" >&2
              exit 1
              ;;
          esac

          if [[ ! -f "${roadmap_path}" ]]; then
            echo "roadmap file not found: ${roadmap_path}" >&2
            exit 1
          fi

          status="$(sed -n '1,20p' "${roadmap_path}" | sed -n 's/^status: //p' | head -n 1)"

          case "${status}" in
            ready|active) ;;
            *)
              echo "roadmap file must be in ready or active status, found: ${status:-missing}" >&2
              exit 1
              ;;
          esac

          printf 'roadmap_path=%s\n' "${roadmap_path}" >> "${GITHUB_OUTPUT}"
          printf 'roadmap_status=%s\n' "${status}" >> "${GITHUB_OUTPUT}"

      - name: Resolve model
        id: model
        shell: bash
        run: |
          set -euo pipefail

          mode="${{ inputs.mode }}"
          requested_model="${{ inputs.model }}"
          pr_number="${{ inputs.pr_number }}"

          case "${mode}" in
            implement)
              resolved_model="${requested_model:-zai-coding-plan/glm-5}"
              printf 'target_ref=\n' >> "${GITHUB_OUTPUT}"
              ;;
            review)
              if [[ -z "${pr_number}" ]]; then
                echo "pr_number is required when mode=review" >&2
                exit 1
              fi
              resolved_model="${requested_model:-opencode/gpt-5.4}"
              printf 'target_ref=PR #%s\n' "${pr_number}" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "unsupported mode: ${mode}" >&2
              exit 1
              ;;
          esac

          case "${resolved_model}" in
            opencode/*|zai-coding-plan/*) ;;
            *)
              echo "model must use an allowed provider prefix: opencode/<model-id> or zai-coding-plan/<model-id>" >&2
              exit 1
              ;;
          esac

          if [[ "${resolved_model}" == */ ]]; then
            echo "model must include a model id after the provider prefix" >&2
            exit 1
          fi

          printf 'model=%s\n' "${resolved_model}" >> "${GITHUB_OUTPUT}"

      - name: Resolve workflow artifact paths
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          printf 'pr_number_path=%s/opencode-pr-number.txt\n' "${RUNNER_TEMP}" >> "${GITHUB_OUTPUT}"
          printf 'pr_head_ref_path=%s/opencode-pr-head-ref.txt\n' "${RUNNER_TEMP}" >> "${GITHUB_OUTPUT}"
          printf 'pr_title_path=%s/opencode-pr-title.txt\n' "${RUNNER_TEMP}" >> "${GITHUB_OUTPUT}"
          printf 'pr_body_path=%s/opencode-pr-body.md\n' "${RUNNER_TEMP}" >> "${GITHUB_OUTPUT}"
          printf 'body_path=%s/opencode-review.md\n' "${RUNNER_TEMP}" >> "${GITHUB_OUTPUT}"
          printf 'decision_path=%s/opencode-review-decision.txt\n' "${RUNNER_TEMP}" >> "${GITHUB_OUTPUT}"
          printf 'diff_path=%s/opencode-pr.diff\n' "${RUNNER_TEMP}" >> "${GITHUB_OUTPUT}"

      - name: Resolve git identity
        id: git_identity
        shell: bash
        run: |
          set -euo pipefail

          printf 'author_name=%s\n' 'github-actions[bot]' >> "${GITHUB_OUTPUT}"
          printf 'author_email=%s\n' '41898282+github-actions[bot]@users.noreply.github.com' >> "${GITHUB_OUTPUT}"

      - name: Resolve model attribution
        id: attribution
        shell: bash
        run: |
          set -euo pipefail

          model_route="${{ steps.model.outputs.model }}"
          provider_id="${model_route%%/*}"
          model_id="${model_route#*/}"
          model_lower="$(printf '%s' "${model_id}" | tr '[:upper:]' '[:lower:]')"

          coauthor_name="AI Agent"
          coauthor_email="noreply@users.noreply.github.com"

          case "${model_lower}" in
            *glm*)
              coauthor_name="GLM"
              coauthor_email="zai-org@users.noreply.github.com"
              ;;
            *gemini*)
              coauthor_name="Gemini"
              coauthor_email="google-gemini@users.noreply.github.com"
              ;;
            *claude*)
              coauthor_name="Claude"
              coauthor_email="claude@users.noreply.github.com"
              ;;
            *gpt*|*codex*)
              coauthor_name="Codex"
              coauthor_email="codex@users.noreply.github.com"
              ;;
          esac

          case "${provider_id}" in
            zai-coding-plan) provider_label="Zhipu" ;;
            opencode) provider_label="OpenCode Zen" ;;
            *) provider_label="${provider_id}" ;;
          esac

          printf 'coauthor_name=%s\n' "${coauthor_name}" >> "${GITHUB_OUTPUT}"
          printf 'coauthor_email=%s\n' "${coauthor_email}" >> "${GITHUB_OUTPUT}"
          printf 'provider_label=%s\n' "${provider_label}" >> "${GITHUB_OUTPUT}"
          printf 'product_label=%s\n' 'opencode' >> "${GITHUB_OUTPUT}"
          printf 'model_label=%s\n' "${model_id}" >> "${GITHUB_OUTPUT}"

      - name: Prepare OpenCode runtime
        shell: bash
        run: |
          set -euo pipefail
          export XDG_DATA_HOME="${RUNNER_TEMP}/opencode/data"
          export XDG_STATE_HOME="${RUNNER_TEMP}/opencode/state"
          export XDG_CACHE_HOME="${RUNNER_TEMP}/opencode/cache"
          mkdir -p "${XDG_DATA_HOME}" "${XDG_STATE_HOME}" "${XDG_CACHE_HOME}"
          {
            printf 'XDG_DATA_HOME=%s\n' "${XDG_DATA_HOME}"
            printf 'XDG_STATE_HOME=%s\n' "${XDG_STATE_HOME}"
            printf 'XDG_CACHE_HOME=%s\n' "${XDG_CACHE_HOME}"
          } >> "${GITHUB_ENV}"

      - name: Install OpenCode CLI
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://opencode.ai/install | bash
          echo "${HOME}/.opencode/bin" >> "${GITHUB_PATH}"

      - name: Prepare implement branch
        id: implement_branch
        if: ${{ inputs.mode == 'implement' }}
        shell: bash
        run: |
          set -euo pipefail

          roadmap_file="${{ steps.roadmap.outputs.roadmap_path }}"
          branch_slug="${roadmap_file#roadmap/}"
          branch_slug="${branch_slug%.md}"
          branch_slug="${branch_slug#*-}"
          branch_name="opencode/${branch_slug}-${GITHUB_RUN_ID}"
          start_sha="$(git rev-parse HEAD)"
          base_ref="${GITHUB_REF_NAME}"

          git checkout -b "${branch_name}"

          printf 'branch_name=%s\n' "${branch_name}" >> "${GITHUB_OUTPUT}"
          printf 'base_ref=%s\n' "${base_ref}" >> "${GITHUB_OUTPUT}"
          printf 'start_sha=%s\n' "${start_sha}" >> "${GITHUB_OUTPUT}"

      - name: Prepare review target
        id: review_target
        if: ${{ inputs.mode == 'review' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          pr_number="${{ inputs.pr_number }}"
          pr_json="$(gh pr view "${pr_number}" --json headRefName,baseRefName,url,title)"
          head_ref="$(printf '%s' "${pr_json}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data["headRefName"])')"
          base_ref="$(printf '%s' "${pr_json}" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data["baseRefName"])')"

          git fetch origin "${base_ref}" "${head_ref}"
          git checkout -B "${head_ref}" "origin/${head_ref}"
          git diff --no-color "origin/${base_ref}...HEAD" > "${{ steps.artifacts.outputs.diff_path }}"

          printf 'head_ref=%s\n' "${head_ref}" >> "${GITHUB_OUTPUT}"
          printf 'base_ref=%s\n' "${base_ref}" >> "${GITHUB_OUTPUT}"

      - name: Run OpenCode implement
        id: opencode_implement
        if: ${{ inputs.mode == 'implement' }}
        env:
          ZAI_CODING_PLAN_API_KEY: ${{ secrets.ZAI_CODING_PLAN_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GIT_AUTHOR_NAME: ${{ steps.git_identity.outputs.author_name }}
          GIT_AUTHOR_EMAIL: ${{ steps.git_identity.outputs.author_email }}
          GIT_COMMITTER_NAME: ${{ steps.git_identity.outputs.author_name }}
          GIT_COMMITTER_EMAIL: ${{ steps.git_identity.outputs.author_email }}
        shell: bash
        run: |
          set -euo pipefail

          prompt="$(cat <<EOF
          \`implement\` mode for roadmap work unit \`${{ steps.roadmap.outputs.roadmap_path }}\`.

          Shared execution contract:
          - Treat that roadmap file as the canonical source of scope.
          - Read \`AGENTS.md\` and the roadmap file before making changes.
          - Apply the \`Runtime: Autonomous GitHub Actions\` policy in \`AGENTS.md\`.
          - Run the repository validation commands listed in \`AGENTS.md\` before finishing.
          - Reference the roadmap path \`${{ steps.roadmap.outputs.roadmap_path }}\` in the final commit message or PR body.
          - Stay on the current branch \`${{ steps.implement_branch.outputs.branch_name }}\`; do not create or switch branches.
          - Do not run \`gh\`, do not push, do not open pull requests, and do not dispatch downstream workflows.
          - If implementation changes are required, commit them locally on the current branch using the workflow-provided git identity and normal AI trailers.
          - After the implementation is complete, write the PR title to \`${{ steps.artifacts.outputs.pr_title_path }}\`.
          - After the implementation is complete, write the PR body markdown to \`${{ steps.artifacts.outputs.pr_body_path }}\`.
          - Stop after the local commit and PR metadata files are written.
          EOF
          )"

          opencode run \
            --model "${{ steps.model.outputs.model }}" \
            --agent build \
            -f "${{ steps.roadmap.outputs.roadmap_path }}" \
            -f AGENTS.md \
            -- \
            "${prompt}"

      - name: Finalize implement commit
        id: finalize_commit
        if: ${{ inputs.mode == 'implement' && steps.opencode_implement.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail

          start_sha="${{ steps.implement_branch.outputs.start_sha }}"
          current_sha="$(git rev-parse HEAD)"

          if [[ "${current_sha}" != "${start_sha}" ]]; then
            if [[ -n "$(git status --short)" ]]; then
              echo "agent left additional uncommitted changes after creating a commit" >&2
              exit 1
            fi

            printf 'commit_sha=%s\n' "${current_sha}" >> "${GITHUB_OUTPUT}"
            printf 'changes_present=true\n' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -z "$(git status --short)" ]]; then
            printf 'changes_present=false\n' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git add -A
          git commit -m "Apply ${{ steps.roadmap.outputs.roadmap_path }}" \
            -m "Co-authored-by: ${{ steps.attribution.outputs.coauthor_name }} <${{ steps.attribution.outputs.coauthor_email }}>" \
            -m "AI-Provider: ${{ steps.attribution.outputs.provider_label }}" \
            -m "AI-Product: ${{ steps.attribution.outputs.product_label }}" \
            -m "AI-Model: ${{ steps.attribution.outputs.model_label }}"

          printf 'commit_sha=%s\n' "$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          printf 'changes_present=true\n' >> "${GITHUB_OUTPUT}"

      - name: Push implement branch
        id: push_branch
        if: ${{ inputs.mode == 'implement' && steps.finalize_commit.outputs.changes_present == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          branch_name="${{ steps.implement_branch.outputs.branch_name }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin "${branch_name}"
          printf 'head_sha=%s\n' "$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Create implement PR
        id: create_pr
        if: ${{ inputs.mode == 'implement' && steps.finalize_commit.outputs.changes_present == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          pr_title_path="${{ steps.artifacts.outputs.pr_title_path }}"
          pr_body_path="${{ steps.artifacts.outputs.pr_body_path }}"

          if [[ ! -s "${pr_title_path}" ]]; then
            printf 'Apply %s\n' "${{ steps.roadmap.outputs.roadmap_path }}" > "${pr_title_path}"
          fi

          if [[ ! -s "${pr_body_path}" ]]; then
            cat > "${pr_body_path}" <<EOF
          ## Summary

          - Apply the scoped roadmap work unit `${{ steps.roadmap.outputs.roadmap_path }}`

          Roadmap: `${{ steps.roadmap.outputs.roadmap_path }}`
          EOF
          fi

          pr_url="$(gh pr create \
            --base "${{ steps.implement_branch.outputs.base_ref }}" \
            --head "${{ steps.implement_branch.outputs.branch_name }}" \
            --title "$(head -n 1 "${pr_title_path}")" \
            --body-file "${pr_body_path}")"
          pr_number="$(printf '%s' "${pr_url}" | sed -E 's#.*/pull/([0-9]+)$#\1#')"

          printf '%s\n' "${pr_number}" > "${{ steps.artifacts.outputs.pr_number_path }}"
          printf '%s\n' "${{ steps.implement_branch.outputs.branch_name }}" > "${{ steps.artifacts.outputs.pr_head_ref_path }}"
          printf 'pr_number=%s\n' "${pr_number}" >> "${GITHUB_OUTPUT}"
          printf 'pr_url=%s\n' "${pr_url}" >> "${GITHUB_OUTPUT}"

      - name: Run OpenCode review
        id: opencode_review
        if: ${{ inputs.mode == 'review' }}
        env:
          ZAI_CODING_PLAN_API_KEY: ${{ secrets.ZAI_CODING_PLAN_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GIT_AUTHOR_NAME: ${{ steps.git_identity.outputs.author_name }}
          GIT_AUTHOR_EMAIL: ${{ steps.git_identity.outputs.author_email }}
          GIT_COMMITTER_NAME: ${{ steps.git_identity.outputs.author_name }}
          GIT_COMMITTER_EMAIL: ${{ steps.git_identity.outputs.author_email }}
        shell: bash
        run: |
          set -euo pipefail

          prompt="$(cat <<EOF
          \`review\` mode for roadmap work unit \`${{ steps.roadmap.outputs.roadmap_path }}\`.

          Shared execution contract:
          - Treat that roadmap file as the canonical source of scope.
          - Read \`AGENTS.md\`, the roadmap file, and the attached diff before deciding.
          - Apply the \`Runtime: Autonomous GitHub Actions\` policy in \`AGENTS.md\`.
          - Do not modify files, do not create commits, do not push, and do not run \`gh\`.
          - Review \`PR #${{ inputs.pr_number }}\` from \`${{ steps.review_target.outputs.head_ref }}\` into \`${{ steps.review_target.outputs.base_ref }}\`.
          - Use the autonomous review rubric in \`AGENTS.md\`.
          - Respond in this exact plain-text format and nothing else:
            1. First line: \`Decision: approve\` or \`Decision: request-changes\` or \`Decision: comment\`
            2. Second line: blank
            3. Remaining lines: the markdown review body
          - Keep the review body concise and structured with:
            1. \`Summary\`
            2. \`Blocking Findings\`
            3. \`Non-Blocking Suggestions\`
            4. \`Validation Notes\`
          - Always reference the roadmap path and PR number in the review body.
          EOF
          )"

          review_output="$(
            opencode run \
            --model "${{ steps.model.outputs.model }}" \
            --agent build \
            -f "${{ steps.roadmap.outputs.roadmap_path }}" \
            -f AGENTS.md \
            -f "${{ steps.artifacts.outputs.diff_path }}" \
            -- \
            "${prompt}"
          )"

          printf '%s\n' "${review_output}" > "${RUNNER_TEMP}/opencode-review-output.txt"

          decision_line="$(printf '%s\n' "${review_output}" | sed -n '1p')"
          decision="$(printf '%s\n' "${decision_line}" | sed -E 's/^Decision: (approve|request-changes|comment)$/\1/')"

          case "${decision}" in
            approve|request-changes|comment) ;;
            *)
              echo "review output did not start with a valid Decision line" >&2
              printf '%s\n' "${review_output}" >&2
              exit 1
              ;;
          esac

          printf '%s\n' "${decision}" > "${{ steps.artifacts.outputs.decision_path }}"
          printf '%s\n' "${review_output}" | tail -n +3 > "${{ steps.artifacts.outputs.body_path }}"

          if [[ ! -s "${{ steps.artifacts.outputs.body_path }}" ]]; then
            echo "review body parsed to an empty file" >&2
            exit 1
          fi

      - name: Dispatch PR validation
        id: dispatch_validation
        if: ${{ inputs.mode == 'implement' && steps.create_pr.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          pr_number="$(tr -d '[:space:]' < "${{ steps.artifacts.outputs.pr_number_path }}")"
          pr_head_ref="$(tr -d '[:space:]' < "${{ steps.artifacts.outputs.pr_head_ref_path }}")"
          pr_head_sha="${{ steps.push_branch.outputs.head_sha }}"

          gh workflow run pr-validation.yml \
            -f pr_number="${pr_number}" \
            -f pr_head_ref="${pr_head_ref}" \
            -f pr_head_sha="${pr_head_sha}"

          printf 'dispatched=true\n' >> "${GITHUB_OUTPUT}"
          printf 'pr_number=%s\n' "${pr_number}" >> "${GITHUB_OUTPUT}"
          printf 'pr_head_ref=%s\n' "${pr_head_ref}" >> "${GITHUB_OUTPUT}"
          printf 'pr_head_sha=%s\n' "${pr_head_sha}" >> "${GITHUB_OUTPUT}"

      - name: Publish PR review
        id: publish_review
        if: ${{ inputs.mode == 'review' && steps.opencode_review.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          pr_number="${{ inputs.pr_number }}"
          body_path="${{ steps.artifacts.outputs.body_path }}"
          decision_path="${{ steps.artifacts.outputs.decision_path }}"

          if [[ ! -s "${body_path}" ]]; then
            echo "review body was not written to ${body_path}" >&2
            exit 1
          fi

          if [[ ! -s "${decision_path}" ]]; then
            echo "review decision was not written to ${decision_path}" >&2
            exit 1
          fi

          decision="$(tr '[:upper:]' '[:lower:]' < "${decision_path}" | tr -d '[:space:]')"
          pr_author_login="$(gh pr view "${pr_number}" --json author -q '.author.login')"

          case "${decision}" in
            approve)
              gh pr review "${pr_number}" --approve --body-file "${body_path}"
              ;;
            request-changes|request_changes|requestchanges)
              if [[ "${pr_author_login}" == 'app/github-actions' || "${pr_author_login}" == 'github-actions[bot]' ]]; then
                gh pr review "${pr_number}" --comment --body-file "${body_path}"
                decision="comment"
              else
                gh pr review "${pr_number}" --request-changes --body-file "${body_path}"
                decision="request-changes"
              fi
              ;;
            comment)
              gh pr review "${pr_number}" --comment --body-file "${body_path}"
              ;;
            *)
              echo "unsupported review decision: ${decision}" >&2
              exit 1
              ;;
          esac

          printf 'decision=%s\n' "${decision}" >> "${GITHUB_OUTPUT}"

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          target_ref="${{ steps.model.outputs.target_ref }}"
          if [[ -z "${target_ref}" ]]; then
            target_ref="n/a"
          fi

          {
            echo "## OpenCode Roadmap"
            echo
            echo "- Mode: \`${{ inputs.mode }}\`"
            echo "- Roadmap path: \`${{ steps.roadmap.outputs.roadmap_path }}\`"
            echo "- Roadmap status: \`${{ steps.roadmap.outputs.roadmap_status }}\`"
            echo "- Resolved model: \`${{ steps.model.outputs.model }}\`"
            echo "- Git commit identity: \`${{ steps.git_identity.outputs.author_name }} <${{ steps.git_identity.outputs.author_email }}>\`"
            echo "- Review target: \`${target_ref}\`"
            echo "- OpenCode implement outcome: \`${{ steps.opencode_implement.outcome || 'n/a' }}\`"
            echo "- OpenCode review outcome: \`${{ steps.opencode_review.outcome || 'n/a' }}\`"
            echo "- Created PR: \`#${{ steps.create_pr.outputs.pr_number || 'n/a' }}\`"
            echo "- Validation dispatch outcome: \`${{ steps.dispatch_validation.outcome || 'n/a' }}\`"
            echo "- Validation dispatch target: \`PR #${{ steps.dispatch_validation.outputs.pr_number || 'n/a' }} / ${{ steps.dispatch_validation.outputs.pr_head_ref || 'n/a' }}\`"
            echo "- Review publish outcome: \`${{ steps.publish_review.outcome || 'n/a' }}\`"
            echo "- Review decision: \`${{ steps.publish_review.outputs.decision || 'n/a' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
