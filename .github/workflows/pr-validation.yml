name: Pull Request Validation
run-name: PR validation / ${{ github.event.pull_request.number || inputs.pr_number || 'manual' }}

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number when dispatching validation directly
        required: false
        type: string
      pr_head_ref:
        description: Pull request head ref when dispatching validation directly
        required: false
        type: string
      pr_head_sha:
        description: Pull request head SHA when dispatching validation directly
        required: false
        type: string

jobs:
  repo-validation:
    name: Repo policy and blueprint checks
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Resolve validation target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              pr_number="${{ github.event.pull_request.number }}"
              pr_head_ref="${{ github.event.pull_request.head.ref }}"
              pr_head_sha="${{ github.event.pull_request.head.sha }}"
              ;;
            workflow_dispatch)
              pr_number="${{ inputs.pr_number }}"
              pr_head_ref="${{ inputs.pr_head_ref }}"
              pr_head_sha="${{ inputs.pr_head_sha }}"
              ;;
            *)
              echo "unsupported event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          if [[ -z "${pr_head_ref}" ]]; then
            echo "pr_head_ref is required for validation target resolution" >&2
            exit 1
          fi

          if [[ -z "${pr_head_sha}" ]]; then
            echo "pr_head_sha is required for validation target resolution" >&2
            exit 1
          fi

          printf 'pr_number=%s\n' "${pr_number:-n/a}" >> "${GITHUB_OUTPUT}"
          printf 'pr_head_ref=%s\n' "${pr_head_ref}" >> "${GITHUB_OUTPUT}"
          printf 'pr_head_sha=%s\n' "${pr_head_sha}" >> "${GITHUB_OUTPUT}"

      - name: Start repo-validation check run
        id: check_run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          check_json="$(
            gh api \
              --method POST \
              repos/${GITHUB_REPOSITORY}/check-runs \
              -f name='Repo policy and blueprint checks' \
              -f head_sha='${{ steps.target.outputs.pr_head_sha }}' \
              -f status='in_progress' \
              -f started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          )"

          check_run_id="$(printf '%s' "${check_json}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          printf 'id=%s\n' "${check_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.pr_head_ref }}

      - name: Check patch formatting
        shell: bash
        run: git diff --check

      - name: Validate audit script syntax
        shell: bash
        run: bash -n collect-project-docs.sh

      - name: Validate blueprint version field
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg -n "^version:" AGENT_BLUEPRINT.md
          else
            grep -nE "^version:" AGENT_BLUEPRINT.md
          fi

      - name: Validate blueprint anchor markers
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg -n "BP-CORE-01|BP-ALIGN-REPORT|BP-RM-DOR" AGENT_BLUEPRINT.md
          else
            grep -nE "BP-CORE-01|BP-ALIGN-REPORT|BP-RM-DOR" AGENT_BLUEPRINT.md
          fi

      - name: Report repository validation scope
        shell: bash
        run: 'echo "N/A: no UI/e2e in this repository"'

      - name: Complete repo-validation check run
        if: ${{ always() && github.event_name == 'workflow_dispatch' && steps.check_run.outputs.id != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          conclusion='success'
          if [[ "${{ job.status }}" != 'success' ]]; then
            conclusion='failure'
          fi

          summary='Repository policy and blueprint checks completed.'
          if [[ "${conclusion}" == 'failure' ]]; then
            summary='Repository policy and blueprint checks failed. See workflow logs for details.'
          fi

          gh api \
            --method PATCH \
            repos/${GITHUB_REPOSITORY}/check-runs/${{ steps.check_run.outputs.id }} \
            -f status='completed' \
            -f conclusion="${conclusion}" \
            -f completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f output[title]='Repo policy and blueprint checks' \
            -f output[summary]="${summary}"

