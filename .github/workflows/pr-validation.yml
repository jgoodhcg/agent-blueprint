name: Pull Request Validation
run-name: PR validation / #${{ github.event.pull_request.number }}

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check patch formatting
        shell: bash
        run: git diff --check

      - name: Validate audit script syntax
        shell: bash
        run: bash -n collect-project-docs.sh

      - name: Validate blueprint version field
        shell: bash
        run: rg -n "^version:" AGENT_BLUEPRINT.md

      - name: Validate blueprint anchor markers
        shell: bash
        run: rg -n "BP-CORE-01|BP-ALIGN-REPORT|BP-RM-DOR" AGENT_BLUEPRINT.md

      - name: Report repository validation scope
        shell: bash
        run: 'echo "N/A: no UI/e2e in this repository"'
