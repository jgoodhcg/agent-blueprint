name: OpenCode Hello

on:
  issue_comment:
    types: [created]

jobs:
  hello:
    if: >-
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'opencode-agent[bot]' &&
      (
        contains(github.event.comment.body, '/opencode hello') ||
        contains(github.event.comment.body, '/oc hello')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode hello responder
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          token: ${{ github.token }}
          prompt: |
            Reply to the triggering GitHub issue with a single short comment that says hello from OpenCode running in GitHub Actions.

            Constraints:
            - Do not edit any files.
            - Do not create a branch.
            - Do not open a pull request.
            - Do not ask follow-up questions.
            - Mention that this is the hello-world workflow.
