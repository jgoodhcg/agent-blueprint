name: OpenCode Hello

on:
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode hello responder
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZAI_CODING_PLAN_API_KEY: ${{ secrets.ZAI_CODING_PLAN_API_KEY }}
        with:
          model: zai-plan/glm-5
          use_github_token: true
          prompt: |
            Produce a single short hello-world response for a manually dispatched GitHub Actions smoke test.
            Mention the exact model you used: `zai-plan/glm-5`.
            Mention that this workflow is pinned to the committed project config and the Z.AI Coding Plan endpoint.

            Constraints:
            - Do not edit any files.
            - Do not create a branch.
            - Do not open a pull request.
            - Do not ask follow-up questions.
            - Mention that this is the hello-world workflow.
